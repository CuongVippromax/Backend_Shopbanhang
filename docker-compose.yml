# =====================================================================
#  HOÀNG KIM BOOK — Docker Compose
# =====================================================================
# Chạy toàn bộ stack: Backend (Spring Boot) + Frontend (Vite/React)
# + PostgreSQL + Redis + MinIO (file storage)
#
# Cách sử dụng:
#   docker-compose up -d          # Chạy nền (background)
#   docker-compose up            # Chạy foreground (xem log)
#   docker-compose down          # Dừng và xóa container
#   docker-compose down -v       # Dừng + xóa container + volume (reset DB)
#
# Truy cập:
#   Frontend : http://localhost:5173
#   Backend  : http://localhost:8080
#   MinIO    : http://localhost:9001  (minio/minio123)
# =====================================================================

services:
  # ─── Database ───────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: hkb-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: shopbanhang
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d shopbanhang"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hkb-net

  # ─── Cache / Session ────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: hkb-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hkb-net

  # ─── Object Storage (hình ảnh sách) ─────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: hkb-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Console (trình quản lý web)
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hkb-net

  # Tạo bucket "shopbanhang" cho MinIO khi khởi động
  minio-init:
    image: minio/mc:latest
    container_name: hkb-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 admin minio123;
      mc mb local/shopbanhang --ignore-existing;
      mc anonymous set download local/shopbanhang;
      echo 'MinIO bucket created successfully';
      exit 0;
      "
    networks:
      - hkb-net

  # ─── Backend — Spring Boot ──────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: hkb-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/shopbanhang
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      MINIO_URL: http://minio:9000
      MINIO_ACCESS-KEY: admin
      MINIO_SECRET-KEY: minio123
      MINIO_BUCKET: shopbanhang
      APP_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:3000
      VNPAY_RETURN_URL: http://localhost:5173/payment/vn-pay-callback
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - hkb-net

  # ─── Frontend — Vite + React ────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    container_name: hkb-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_BASE_URL: http://localhost:8080/api/v1
    depends_on:
      - backend
    networks:
      - hkb-net

# ─── Networks & Volumes ───────────────────────────────────────────────
networks:
  hkb-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
