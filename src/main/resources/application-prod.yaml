spring:
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/shopbanhang}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

minio:
  url: ${MINIO_URL:http://minio:9000}
  access-key: ${MINIO_ACCESS_KEY}
  secret-key: ${MINIO_SECRET_KEY}

app:
  security:
    allowedOrigins: ${APP_SECURITY_ALLOWEDORIGINS:http://localhost:3000,http://localhost:80,http://frontend}

jwt:
  secretKey: ${JWT_SECRET}

payment:
  vnPay:
    returnUrl: ${VNPAY_RETURN_URL:http://localhost/payment/vn-pay-callback}
    tmnCode: ${VNPAY_TMN_CODE}
    secretKey: ${VNPAY_SECRET_KEY}

logging:
  level:
    root: INFO
    com.cuong.shopbanhang: INFO
