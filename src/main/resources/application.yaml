server:
  port: 8080
spring:
  data:
    redis:
      host: localhost
      port: 6379
  application:
    name: Hoang Kim Book
  datasource:
    url: jdbc:postgresql://localhost:5432/shopbanhang
    username: postgres
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        show_sql: false
        jdbc:
          batch_size: 20
      order_inserts: true
      order_updates: true
    open-in-view: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    baseline-version: 0
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  ai:
    google:
      genai:
        api-key: ${AI_API_KEY}
        model: ${GEMINI_MODEL:gemini-3.1-flash-lite-preview}
app:
  security:
    allowedOrigins:
      - http://localhost:5173
      - http://localhost:3000
      - http://localhost:4200
    publicEndpoints:
      - /api/v1/auth/**
      - /api/v1/docs/**
      - /swagger-ui.html
      - /swagger-ui/**
      - /api/v1/books/**
      - /api/books/**
      - /api/v1/books/flash-sale
      - /api/books/flash-sale
      - /api/v1/categories/**
      - /api/categories/**
      - /api/v1/articles/**
      - /api/articles/**
      - /api/v1/reviews/**
      - /api/reviews/**
      - /api/v1/users/register
      - /api/v1/users/forgot-password
      - /api/v1/users/reset-password
      - /api/v1/payment/**
      - /api/v1/faqs/**
      - /api/faqs/**
      - /api/v1/chatbot/**
      - /api/chatbot/**

jwt:
  secretKey: ${JWT_SECRET}
  accessToken:
    expiration: 86400000
  refreshToken:
    expiration: 604800000

minio:
  url: http://localhost:9000
  access-key: ${MINIO_ACCESS_KEY}
  secret-key: ${MINIO_SECRET_KEY}
  bucket: shopbanhang

logging:
  level:
    root: WARN
    com.cuong.shopbanhang: INFO
    com.cuong.shopbanhang.exception: WARN
    com.cuong.shopbanhang.security: WARN
    com.cuong.shopbanhang.service.ChatbotService: INFO
    com.cuong.shopbanhang.service.EmailService: WARN
    com.cuong.shopbanhang.service.MinIOService: WARN
    com.cuong.shopbanhang.service.DashboardService: WARN
    org.springframework.web: WARN
    org.hibernate: WARN
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: WARN

payment:
  vnPay:
    url: https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
    returnUrl: http://localhost:3000/payment/vn-pay-callback
    tmnCode: ${VNPAY_TMN_CODE}
    secretKey: ${VNPAY_SECRET_KEY}
    version: 2.1.0
    command: pay
    orderType: other