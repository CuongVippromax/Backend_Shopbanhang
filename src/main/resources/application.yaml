
server:
  port: 8080
spring:
  data:
    redis:
      host: localhost
      port: 6379
  application:
    name: shopbanhang
  datasource:
    url: jdbc:postgresql://localhost:5432/shopbanhang
    username: postgres
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        show_sql: false
        jdbc:
          batch_size: 20
      order_inserts: true
      order_updates: true
    open-in-view: true
  mail:
    host: smtp.gmail.com
    port: 587
    username: cuongssdz1@gmail.com
    password: ${EMAIL_PASSWORD:cwqlwpquczqlppnp}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

app:
  security:
    allowed-origins:
      - http://localhost:3000
      - http://localhost:4200
      - http://localhost:5173
    public-endpoints:
      - /api/v1/auth/**
      - /api/v1/docs/**
      - /swagger-ui.html
      - /swagger-ui/**
      - /api/v1/books/**
      - /api/books/**
      - /api/v1/categories/**
      - /api/categories/**
      - /api/v1/users/register
      - /api/v1/users/forgot-password
      - /api/v1/users/reset-password
      - /api/v1/payment/**

